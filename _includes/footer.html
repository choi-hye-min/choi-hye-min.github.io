<footer class="site-footer">
    <canvas class="particle-network" aria-hidden="true"
            data-particle-count="52" data-particle-count-mobile="26"
            data-particle-opacity="0.9" data-particle-speed="0.75"
            data-particle-connection-distance="170"
            data-particle-interactive="false"></canvas>
    <div class="footer-inner">
        <p>© {{ 'now' | date: "%Y" }} {{ site.copyright.name | default: site.title }}</p>
        <nav aria-label="보조 메뉴">
            <a href="{{ site.baseurl }}/portfolio/">Portfolio</a>
            <a href="{{ site.github }}" target="_blank" rel="noopener noreferrer">GitHub</a>
            <a href="{{ site.baseurl }}/feed.xml">RSS</a>
        </nav>
    </div>
</footer>
